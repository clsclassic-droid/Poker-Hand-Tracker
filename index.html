<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Hand Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">

        <!-- Header -->
        <header>
            <h1>🃏 Poker Hand Tracker</h1>
            <div id="auth-container">
                <button id="auth-btn" disabled>เข้าสู่ระบบด้วย Google</button>
                <div id="user-display">
                    <span id="user-name"></span>
                    <button id="signout-btn">ออกจากระบบ</button>
                </div>
            </div>
        </header>

        <!-- Setup Overlay -->
        <div id="setup-overlay">
            <div class="setup-card">
                <div class="setup-icon">📊</div>
                <h2>กำลังเชื่อมต่อ Google Sheet</h2>
                <p id="setup-msg">กำลังค้นหา spreadsheet ...</p>
                <div class="setup-spinner"></div>
            </div>
        </div>

        <!-- Main Content -->
        <main id="main-content">

            <!-- Hand Number + Date + Sheet Link -->
            <div id="top-bar">
                <div id="hand-number">Hand #<span id="hand-num-display">1</span></div>
                <label for="date-input" class="date-lbl">วันที่</label>
                <input type="date" id="date-input" class="date-input">
                <button id="hide-hand-btn" class="icon-btn" title="ซ่อน/แสดง Hand">👁 Hand</button>
                <button id="settings-btn" class="icon-btn" title="ตั้งค่า">⚙ ตั้งค่า</button>
                <a id="sheet-link" href="#" target="_blank" title="เปิด Google Sheet">
                    📊 เปิด Sheet
                </a>
            </div>

            <!-- Position Row -->
            <div id="position-row">
                <label>ตำแหน่ง</label>
                <div id="position-chips">
                    <button class="pos-chip" data-pos="SB">SB</button>
                    <button class="pos-chip" data-pos="BB">BB</button>
                    <button class="pos-chip" data-pos="UTG">UTG</button>
                    <button class="pos-chip" data-pos="UTG+1">UTG+1</button>
                    <button class="pos-chip" data-pos="Mid">Mid</button>
                    <button class="pos-chip" data-pos="Mid+1">Mid+1</button>
                    <button class="pos-chip" data-pos="HJ">HJ</button>
                    <button class="pos-chip" data-pos="LJ">LJ</button>
                    <button class="pos-chip" data-pos="CO">CO</button>
                    <button class="pos-chip" data-pos="BT">BT</button>
                </div>
            </div>

            <!-- Fields Bar -->
            <div id="fields-bar">
                <!-- Built by JS -->
            </div>

            <!-- Bet Row -->
            <div id="bet-row">
                <div class="bet-cell"><input type="number" id="bet-pf"    class="bet-input" placeholder="0" step="any"></div>
                <div class="bet-cell"><input type="number" id="bet-flop"  class="bet-input" placeholder="0" step="any"></div>
                <div class="bet-cell"><input type="number" id="bet-turn"  class="bet-input" placeholder="0" step="any"></div>
                <div class="bet-cell"><input type="number" id="bet-river" class="bet-input" placeholder="0" step="any"></div>
                <div class="bet-summary">
                    <span class="bet-dot">=</span>
                    <span id="bet-total" class="bet-total">0 ฿</span>
                    <span id="pot-odds-badge" class="pot-odds-badge pot-odds-empty">—</span>
                    <span class="bet-sec-lbl">Pot</span>
                    <input type="number" id="pot-input" class="bet-input pot-input" placeholder="0" step="any">
                    <span class="bet-cur">฿</span>
                    <span id="result-preview" class="result-preview">—</span>
                </div>
            </div>

            <!-- Card Picker -->
            <div id="card-picker-section">
                <div id="picker-header">
                    <div id="picker-left">
                        <span id="picker-label">กำลังเลือก:</span>
                        <span id="picker-field-name">HAND</span>
                        <span id="picker-count" class="count-badge">0 / 2</span>
                    </div>
                    <div id="picker-right">
                        <button class="icon-btn" id="fold-btn">🏳 Fold</button>
                        <button class="icon-btn" id="comment-toggle-btn">💬 Note</button>
                        <button class="icon-btn" id="clear-field-btn" title="ล้างฟิลด์นี้">✕ ล้าง</button>
                        <button id="save-btn" class="icon-btn save-icon-btn">💾 บันทึก Hand</button>
                    </div>
                </div>
                <div id="card-grid-wrap">
                    <div id="card-grid">
                        <!-- Built by JS -->
                    </div>
                </div>
                <!-- Comment input (hidden by default, toggle with 💬 button) -->
                <div id="comment-row" class="comment-hidden">
                    <div id="comment-label">💬 HAND</div>
                    <textarea id="comment-input" placeholder="บันทึกเหตุการณ์ที่เกิดขึ้น..."></textarea>
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="actions">
                <button id="cancel-edit-btn" class="btn-cancel" style="display:none">✕ ยกเลิกแก้ไข</button>
            </div>

            <!-- History Table -->
            <div id="history-section">
                <div id="history-header">
                    <h2>ประวัติล่าสุด</h2>
                    <span id="history-count"></span>
                </div>
                <div id="history-scroll">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Pos</th>
                                <th>Hand</th>
                                <th>Flop</th>
                                <th>Turn</th>
                                <th>River</th>
                                <th>5-Card</th>
                                <th>HIT</th>
                                <th>SD1</th>
                                <th>SD2</th>
                                <th>Result</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Hand Detail Modal -->
    <div id="hand-modal-overlay" class="hand-modal-hidden">
        <div id="hand-modal">
            <div id="hand-modal-header">
                <div id="hand-modal-title"></div>
                <button id="hand-modal-close" class="icon-btn">✕</button>
            </div>
            <div id="hand-modal-body"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay">
        <div id="settings-panel">
            <div id="settings-header">
                <span>ตั้งค่า</span>
                <button id="settings-close" class="icon-btn">✕</button>
            </div>
            <div id="settings-body">
                <label class="setting-row">
                    <div class="setting-info">
                        <span class="setting-title">4-Color Deck</span>
                        <span class="setting-desc">♦ น้ำเงิน · ♣ เขียว (อ่านง่ายขึ้น)</span>
                    </div>
                    <div class="toggle-wrap">
                        <input type="checkbox" id="toggle-fourcolor" class="toggle-input">
                        <span class="toggle-track"></span>
                    </div>
                </label>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"></div>

    <!-- Load app first so callbacks are defined when Google scripts fire -->
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
</body>
</html>
